<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream - My Camera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .video-container {
            position: relative;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Lật gương cho tự nhiên */
        }
        .live-badge {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-slate-800 bg-slate-900/50 backdrop-blur">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-500 rounded-full live-badge"></div>
            <h1 class="text-xl font-bold tracking-wider uppercase">Live Dashboard</h1>
        </div>
        <div id="viewer-count" class="bg-slate-800 px-4 py-1.5 rounded-full text-sm font-medium flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-blue-400">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <span>1,248 đang xem</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 lg:p-10 gap-8">
        
        <!-- Video Frame -->
        <div class="video-container w-full max-w-4xl aspect-video group border border-slate-700">
            
            <!-- Video Element -->
            <video id="webcam" autoplay playsinline class="opacity-0 transition-opacity duration-700"></video>
            
            <!-- Placeholder -->
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-10 transition-opacity duration-500">
                <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-slate-500">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
                <button onclick="startCamera()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-full font-bold shadow-lg shadow-blue-500/20 transition-all transform hover:scale-105 active:scale-95">
                    Bắt đầu Quay Live
                </button>
            </div>

            <!-- Overlay Controls (Hiện khi hover) -->
            <div id="controls" class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black/90 to-transparent flex justify-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">
                <button id="btn-mic" onclick="toggleMic()" class="p-4 bg-slate-800 hover:bg-slate-700 rounded-full transition-colors border border-slate-600">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                </button>
                <button onclick="stopCamera()" class="p-4 bg-red-600 hover:bg-red-500 rounded-full transition-colors border border-red-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
        </div>

        <!-- Info Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 w-full max-w-4xl">
            <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Thời gian live</p>
                <p id="timer" class="text-xl font-mono">00:00:00</p>
            </div>
            <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl text-center">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Chất lượng</p>
                <p class="text-xl font-semibold text-green-400">4K Ultra HD</p>
            </div>
            <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl text-right">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Máy chủ</p>
                <p class="text-xl font-semibold text-blue-400">Vietnam-S1</p>
            </div>
        </div>
    </main>

    <!-- Script -->
    <script>
        const video = document.getElementById('webcam');
        const placeholder = document.getElementById('placeholder');
        const timerElement = document.getElementById('timer');
        let stream = null;
        let startTime = null;
        let timerInterval = null;
        let isMicOn = true;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1920, height: 1080 }, 
                    audio: true 
                });
                video.srcObject = stream;
                video.classList.remove('opacity-0');
                placeholder.classList.add('opacity-0');
                setTimeout(() => placeholder.style.display = 'none', 500);
                
                startTimer();
            } catch (err) {
                console.error("Lỗi:", err);
                alert("Không thể truy cập camera. Hãy chắc chắn bạn đã cấp quyền và đang dùng HTTPS.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.classList.add('opacity-0');
                placeholder.style.display = 'flex';
                setTimeout(() => placeholder.classList.remove('opacity-0'), 10);
                clearInterval(timerInterval);
                timerElement.innerText = "00:00:00";
            }
        }

        function toggleMic() {
            if (stream) {
                const audioTrack = stream.getAudioTracks()[0];
                isMicOn = !isMicOn;
                audioTrack.enabled = isMicOn;
                
                const micIcon = document.getElementById('mic-icon');
                if (isMicOn) {
                    micIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />';
                    document.getElementById('btn-mic').classList.replace('bg-red-600', 'bg-slate-800');
                } else {
                    micIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />';
                    document.getElementById('btn-mic').classList.replace('bg-slate-800', 'bg-red-600');
                }
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const h = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
                const m = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                timerElement.innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        // Giả lập số người xem thay đổi
        setInterval(() => {
            const current = parseInt(document.querySelector('#viewer-count span').innerText.replace(',', ''));
            const next = current + Math.floor(Math.random() * 21) - 10;
            document.querySelector('#viewer-count span').innerText = next.toLocaleString() + " đang xem";
        }, 3000);
    </script>
</body>
</html>
